<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Tender Docs → Act · Options</title>
<style>
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    color:#14181f; max-width:520px; margin:32px auto; padding:0 20px; font-size:14px; }
  h1 { font-size:18px; }
  h1 .dot { color:#b41034; }
  .fld { display:flex; flex-direction:column; gap:4px; margin:16px 0; }
  label { font-size:12px; color:#5b626d; text-transform:uppercase; letter-spacing:.04em; }
  input { padding:8px 10px; border:1px solid #e6e8ec; border-radius:8px; font-size:14px; }
  input:focus { outline:none; border-color:#b41034; box-shadow:0 0 0 3px #fbe9ec; }
  .hint { font-size:12px; color:#5b626d; margin-top:2px; }
  button { background:#b41034; color:#fff; border:0; padding:9px 20px; border-radius:8px;
    font-weight:600; cursor:pointer; font-size:13px; }
  button:hover { background:#8a0c28; }
  .saved { color:#1f8a63; margin-left:12px; font-size:13px; }
  hr { border:0; border-top:1px solid #e6e8ec; margin:22px 0; }
</style>
</head>
<body>
  <h1><span class="dot">●</span> Tender Docs → Act — Options</h1>
  <div class="fld">
    <label for="baseUrl">App base URL</label>
    <input id="baseUrl" type="text" placeholder="http://localhost:8000">
    <div class="hint">Where the KHMDHS explorer runs. Local dev: <code>http://localhost:8000</code>. Production: your Render URL.</div>
  </div>
  <hr>
  <div class="hint" style="margin-bottom:8px;">
    Credentials are <b>optional</b>. If you're already logged into the app in a tab, the browser reuses that session automatically. Set them here only if uploads come back <b>401</b>.
  </div>
  <div class="fld">
    <label for="authUser">Basic-Auth username (optional)</label>
    <input id="authUser" type="text" autocomplete="off">
  </div>
  <div class="fld">
    <label for="authPass">Basic-Auth password (optional)</label>
    <input id="authPass" type="password" autocomplete="off">
  </div>
  <div>
    <button id="save">Save</button>
    <span class="saved" id="saved"></span>
  </div>
  <script src="options.js"></script>
</body>
</html>
