name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Fast static checks — no DB needed. Run first so obvious mistakes fail cheaply.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt

      # Correctness-only ruff subset (syntax + pyflakes logic: undefined names,
      # bad f-strings, redefinitions). Deliberately NOT style/unused-imports, so
      # it catches real bugs without churn on the existing code.
      - name: Ruff (correctness rules)
        run: ruff check --select E9,F63,F7,F82,F821,F811 .

      # Dependency CVE scan. Blocks on NEW advisories; the ignore list is the set
      # we've triaged and deferred (transitive/major-bump). Revisit periodically.
      #   PYSEC-2026-1845  pytest (test-only; needs pytest 9 major bump)
      #   PYSEC-2026-248/249  starlette (transitive via fastapi; needs fastapi bump)
      - name: pip-audit (dependency CVEs)
        run: |
          pip-audit \
            --ignore-vuln PYSEC-2026-1845 \
            --ignore-vuln PYSEC-2026-248 \
            --ignore-vuln PYSEC-2026-249

      # Every migration file must be listed in the manifest (and vice versa), so a
      # new migration can't be silently forgotten. (A full empty-DB replay isn't
      # feasible: the historical root migrations accreted against evolving state
      # and don't re-run cleanly from scratch — the snapshot is the source of
      # truth. See tests/proc_schema.sql.)
      - name: Migration manifest consistency
        run: python .github/scripts/check_migration_manifest.py

  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: procurement_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      # conftest builds the schema from tests/proc_schema.sql into this DB.
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/procurement_test
      PGPASSWORD: postgres

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Ensure psql client is available (conftest applies the schema with it)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -q
