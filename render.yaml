# ---------------------------------------------------------------------------- #
# render.yaml — Render Blueprint. With this file in your repo root, Render can
# create the service automatically (New → Blueprint → pick your repo).
#
# After it deploys, set the two SECRET env vars in the Render dashboard
# (they're marked sync:false so they are NOT read from this file / git):
#   DATABASE_URL  — from Supabase: Project Settings → Database → Connection
#                   string → URI (use the "Connection pooler" / port 6543 URI
#                   for serverless-style web apps).
#   SECRET_KEY    — random key that signs the session cookies (accounts / auth).
#                   Generate with: python3 -c "import secrets; print(secrets.token_hex(32))"
#                   MUST be set before/with the auth deploy — without it the app
#                   falls back to an insecure built-in key and sessions are forgeable.
# ---------------------------------------------------------------------------- #
services:
  - type: web
    name: khmdhs-explorer
    runtime: docker
    plan: free                 # sleeps after inactivity; upgrade to "starter" ($7/mo) for always-on
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        sync: false            # set in dashboard (secret)
      - key: SECRET_KEY
        sync: false            # set in dashboard (secret) — signs session cookies

  # Background job worker — drains the admin job queue OFF the web process.
  # The admin UI enqueues backfills / table-extraction jobs (proc.ingest_job,
  # proc.table_extract_job with status='queued'); this long-running worker
  # claims and runs them (worker.py), so heavy ingestion never runs on the web
  # dyno and survives a web deploy/restart. INERT until you apply the Blueprint.
  #   DATABASE_URL — the DB URL the worker runs jobs against (app_runtime is
  #                  fine; the jobs only do DML). Set it in the dashboard.
  - type: worker
    name: khmdhs-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter             # Background Workers need a paid plan
    dockerCommand: python worker.py
    envVars:
      - key: DATABASE_URL
        sync: false

  # Scheduled incremental ingestion — runs OFF the web process (a Cron Job spins
  # up, runs cron_catchup.py = per-source `db.py catchup`, then exits). Watermark-
  # based, so re-running is safe. INERT until you apply the Blueprint + set its env.
  #   DATABASE_URL             — the DB URL (use the OWNER url if you set
  #                              CRON_REFRESH_ANALYTICS=1, which REFRESHes matviews).
  #   CRON_REFRESH_ANALYTICS   — optional "1" to refresh /analytics after catchup.
  #   CRON_DISABLE / CRON_STEPS — optional, to skip or customise sources.
  - type: cron
    name: khmdhs-catchup
    runtime: docker
    dockerfilePath: ./Dockerfile
    schedule: "30 3 * * *"     # daily 03:30 UTC (adjust as needed)
    dockerCommand: python cron_catchup.py
    envVars:
      - key: DATABASE_URL
        sync: false
# ---------------------------------------------------------------------------- #
# Enabling the background worker (needed for admin-launched jobs in prod):
#   1. Push; in Render, apply the Blueprint change → it creates "khmdhs-worker"
#      (Background Workers need a paid plan).
#   2. Set its DATABASE_URL (app_runtime url is fine). It starts polling and runs
#      whatever the admin UI enqueues.
#   NOTE: until this worker runs, admin-launched jobs sit in 'queued' (the web
#   process no longer runs them itself). Locally, the web app runs an inline
#   worker thread, so no separate process is needed in dev.
#
# Enabling the catchup cron:
#   1. Apply the Blueprint → it creates "khmdhs-catchup" (Cron Jobs need a paid plan).
#   2. Set its DATABASE_URL (owner url recommended). Trigger a manual run to test.
#   3. It then runs daily and replaces running `./ingest.sh prod catchup` by hand.
# ---------------------------------------------------------------------------- #
