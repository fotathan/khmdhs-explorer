{% extends "beta_base.html" %}
{% block title %}{{ t("Σύνδεση") }} · {{ t("Εξερευνητής") }}{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h1>{{ t("Σύνδεση") }}</h1>
    {% if error %}<div class="auth-error">{{ error | t }}</div>{% endif %}
    <form method="post" action="/login">
      <input type="hidden" name="next" value="{{ next }}">
      <label>{{ t("Όνομα χρήστη") }}
        <input type="text" name="username" autocomplete="username" autofocus required>
      </label>
      <label>{{ t("Κωδικός") }}
        <input type="password" name="password" autocomplete="current-password" required>
      </label>
      <button type="submit" class="auth-btn">{{ t("Σύνδεση") }}</button>
    </form>
    <p class="auth-alt">{{ t("Δεν έχετε λογαριασμό;") }} <a href="/register">{{ t("Εγγραφή") }}</a></p>
  </div>
</div>
<style>
  .auth-wrap{max-width:420px;margin:56px auto;padding:0 20px;}
  .auth-card{background:var(--paper);border:1px solid var(--rule);border-radius:14px;
    padding:28px 26px;box-shadow:var(--shadow-sm, 0 1px 3px rgba(20,24,31,.06));}
  .auth-card h1{font-size:22px;margin:0 0 18px;}
  .auth-card form{display:flex;flex-direction:column;gap:14px;}
  .auth-card label{display:flex;flex-direction:column;gap:5px;font-size:13px;color:var(--ink-2);}
  .auth-card input{padding:9px 11px;border:1px solid var(--rule);border-radius:8px;font-size:14px;color:var(--ink);}
  .auth-card input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
  .auth-btn{background:var(--accent);color:#fff;border:0;padding:11px;border-radius:9px;
    font-weight:600;font-size:14px;cursor:pointer;margin-top:4px;}
  .auth-btn:hover{background:var(--accent-2);}
  .auth-error{background:#fdeceb;border:1px solid #f4c7c3;color:#b3261e;padding:9px 12px;
    border-radius:8px;font-size:13px;margin-bottom:14px;}
  .auth-alt{font-size:13px;color:var(--ink-2);margin:16px 0 0;text-align:center;}
  .auth-alt a{color:var(--accent);font-weight:600;}
</style>
{% endblock %}
