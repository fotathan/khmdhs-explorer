{% extends "beta_base.html" %}
{% block title %}{{ t("Ανάδοχοι · Εξερευνητής") }}{% endblock %}
{% block content %}
<main>
  <div class="page-head">
    <h1>{{ t("Ανάδοχοι / Προμηθευτές") }}</h1>
    <div class="sub"><b id="rec-count">{{ "{:,}".format(total).replace(",", ".") }}</b> {{ t("εγγραφές") }}</div>
  </div>

  <form id="filters" hx-get="/contractors" hx-target="#results"
        hx-trigger="submit, change from:select" hx-push-url="true">
    <div class="toolbar">
      <div class="searchbar" style="max-width:480px;flex:1;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" name="q" value="{{ q }}" placeholder="{{ t('Αναζήτηση ονόματος ή ΑΦΜ…') }}">
        <button class="go" type="submit">{{ t("Αναζήτηση") }}</button>
      </div>
      <div class="sort-sel">{{ t("ταξινόμηση") }}
        <select name="sort">
          <option value="activity" {% if sort=='activity' %}selected{% endif %}>{{ t("Δραστηριότητα ↓") }}</option>
          <option value="name" {% if sort=='name' %}selected{% endif %}>{{ t("Όνομα Α–Ω") }}</option>
          <option value="name_desc" {% if sort=='name_desc' %}selected{% endif %}>{{ t("Όνομα Ω–Α") }}</option>
        </select>
      </div>
    </div>

    <div id="results">
      {% include "beta_contractors_results.html" %}
    </div>
  </form>
</main>
{% endblock %}
