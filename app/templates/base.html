<!doctype html>
<html lang="el">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}Ελληνικές Δημόσιες Συμβάσεις · Εξερευνητής{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>

  <style>
    :root {
      --paper:      #ffffff;
      --paper-2:    #f6f7f9;
      --ink:        #14181f;
      --ink-2:      #5b626d;
      --ink-3:      #9aa0aa;
      --rule:       #e6e8ec;
      --rule-2:     #f0f1f4;
      --accent:     #2563c4;
      --accent-2:   #1d4ea0;
      --accent-soft:#eef3fc;
      --warn:       #c2630c;
      --ok:         #1f7a46;
      --sans:       "Schibsted Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --serif:      "Schibsted Grotesk", -apple-system, sans-serif;
      --mono:       "IBM Plex Mono", "SF Mono", Menlo, monospace;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.55;
      color: var(--ink);
      background: var(--paper);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    a { color: var(--accent); }

    header.masthead {
      border-bottom: 1px solid var(--rule);
      padding: 20px 40px 18px;
      position: sticky; top: 0; z-index: 20;
      backdrop-filter: saturate(180%) blur(8px);
      background: rgba(255,255,255,0.85);
    }
    .mast-row { display: flex; justify-content: space-between; align-items: center; gap: 32px; }
    .mast-title {
      font-family: var(--sans); font-weight: 700; font-size: 19px;
      letter-spacing: -0.02em; line-height: 1; color: var(--ink);
      text-decoration: none; display: inline-flex; align-items: center; gap: 8px;
    }
    .mast-title::before { content: ""; width: 10px; height: 10px; background: var(--accent); border-radius: 3px; display: inline-block; }
    .mast-title em { font-style: normal; font-weight: 700; color: var(--accent); }
    .mast-meta {
      font-family: var(--sans); font-size: 13px; font-weight: 500; letter-spacing: 0;
      color: var(--ink-3); text-transform: none; display: flex; gap: 22px; align-items: center;
    }
    .mast-meta a { color: var(--ink-2) !important; text-decoration: none; transition: color 120ms ease; }
    .mast-meta a:hover { color: var(--accent) !important; }
    .mast-sub { font-family: var(--sans); font-size: 13px; color: var(--ink-3); margin-top: 10px; max-width: 720px; }

    main { max-width: 1320px; margin: 0 auto; padding: 0 40px 96px; }
    .grid { display: grid; grid-template-columns: 264px 1fr; gap: 48px; margin-top: 32px; }
    @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }

    aside.filters { border-right: 1px solid var(--rule); padding-right: 32px; }
    @media (max-width: 900px) {
      aside.filters { border-right: 0; padding-right: 0; border-bottom: 1px solid var(--rule); padding-bottom: 24px; }
    }
    .filter-h { font-family: var(--sans); font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-3); margin: 22px 0 10px; }
    .filter-h:first-child { margin-top: 0; }
    .field { margin: 8px 0 16px; }
    .field label { display: block; font-size: 12px; font-weight: 500; color: var(--ink-2); margin-bottom: 6px; }
    .field input, .field select {
      width: 100%; font-family: var(--sans); font-size: 13px; padding: 8px 10px;
      background: var(--paper); border: 1px solid var(--rule); border-radius: 8px; color: var(--ink);
      transition: border-color 120ms ease, box-shadow 120ms ease;
    }
    .field input:focus, .field select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    /* Native date inputs need ~140px (text + calendar icon); too wide for the
       narrow filter rail in two columns, so date pairs stack full-width. */
    .date-pair { display: grid; grid-template-columns: 1fr; gap: 8px; }
    .field input[type=date] { min-width: 0; width: 100%; }
    .seg { display: flex; border: 1px solid var(--rule); border-radius: 8px; overflow: hidden; }
    .seg label { flex: 1; text-align: center; padding: 7px 4px; font-size: 12px; cursor: pointer; color: var(--ink-2); border-right: 1px solid var(--rule); transition: background 120ms ease; }
    .seg label:last-child { border-right: 0; }
    .seg input { display: none; }
    .seg input:checked + span, .seg label:has(input:checked) { background: var(--accent); color: #fff; }

    .seg-vert { display: flex; flex-direction: column; border: 1px solid var(--rule); border-radius: 10px; overflow: hidden; }
    .seg-vert label { display: block; padding: 10px 14px; font-size: 13.5px; font-weight: 500; font-family: var(--sans); color: var(--ink-2); cursor: pointer; border-bottom: 1px solid var(--rule-2); transition: background 120ms ease, color 120ms ease; }
    .seg-vert label:last-child { border-bottom: 0; }
    .seg-vert label:hover { background: var(--paper-2); }
    .seg-vert label.on, .seg-vert label:has(input:checked) { background: var(--accent-soft); color: var(--accent-2); font-weight: 600; box-shadow: inset 3px 0 0 var(--accent); }
    .seg-vert input { display: none; }

    .search-row { display: flex; border: 1px solid var(--rule); background: var(--paper); border-radius: 10px; overflow: hidden; transition: border-color 120ms ease, box-shadow 120ms ease; }
    .search-row:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    .search-row input[type=search] { flex: 1; border: 0; background: transparent; padding: 13px 16px; font-family: var(--sans); font-size: 16px; color: var(--ink); }
    .search-row input[type=search]::placeholder { color: var(--ink-3); }
    .search-row input[type=search]:focus { outline: none; }
    .search-row button { border: 0; background: var(--accent); color: #fff; padding: 0 22px; font-family: var(--sans); font-size: 13px; font-weight: 600; cursor: pointer; transition: background 120ms ease; }
    .search-row button:hover { background: var(--accent-2); }

    .results-bar { display: flex; justify-content: space-between; align-items: baseline; gap: 16px; margin: 26px 0 14px; padding-bottom: 14px; border-bottom: 1px solid var(--rule); }
    .counters { font-family: var(--sans); font-size: 15px; color: var(--ink-2); }
    .counters .num { font-weight: 700; color: var(--ink); font-variant-numeric: tabular-nums; }
    .counters .lbl { color: var(--ink-3); margin-right: 10px; }
    .sort-row { font-family: var(--sans); font-size: 12px; color: var(--ink-3); }
    .sort-row select { font-family: var(--sans); font-size: 12px; background: var(--paper); border: 1px solid var(--rule); border-radius: 7px; padding: 5px 8px; }

    table.notices { width: 100%; border-collapse: collapse; font-size: 13.5px; }
    table.notices th { text-align: left; font-family: var(--sans); font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; font-weight: 600; color: var(--ink-3); padding: 8px 10px; border-bottom: 1px solid var(--rule); }
    table.notices td { padding: 15px 10px; vertical-align: top; border-bottom: 1px solid var(--rule-2); }
    table.notices tbody tr { transition: background 100ms ease; }
    table.notices tbody tr:hover { background: var(--paper-2); }
    .adam { font-family: var(--mono); font-size: 11.5px; color: var(--ink-3); white-space: nowrap; }
    .title-cell a { color: var(--ink); text-decoration: none; font-family: var(--sans); font-size: 14.5px; font-weight: 500; line-height: 1.4; display: block; }
    .title-cell a:hover { color: var(--accent); }
    .auth { font-size: 12px; color: var(--ink-2); margin-top: 4px; }
    .val { font-variant-numeric: tabular-nums; font-family: var(--mono); font-size: 12.5px; text-align: right; white-space: nowrap; color: var(--ink); }
    .meta { font-family: var(--sans); font-size: 12px; color: var(--ink-3); }

    .pill { display: inline-block; font-family: var(--sans); font-size: 10.5px; font-weight: 600; letter-spacing: 0.02em; text-transform: uppercase; padding: 2px 8px; border: 0; border-radius: 999px; margin-right: 4px; background: var(--paper-2); color: var(--ink-2); }
    .pill.cancel { color: #b42318; background: #fdeceb; }
    .pill.amend  { color: var(--warn); background: #fdf1e3; }

    .pager { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--rule); font-family: var(--sans); font-size: 13px; color: var(--ink-2); }
    .pager a, .pager span.page-num { color: var(--ink); text-decoration: none; padding: 6px 12px; border: 1px solid var(--rule); border-radius: 8px; margin: 0 3px; cursor: pointer; transition: border-color 120ms ease, color 120ms ease, background 120ms ease; }
    .pager a:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
    .pager span.disabled { color: var(--ink-3); border: 1px solid var(--rule-2); border-radius: 8px; padding: 6px 12px; margin: 0 3px; }
    .pager span.current { background: var(--accent); color: #fff; border: 1px solid var(--accent); border-radius: 8px; padding: 6px 12px; margin: 0 3px; }

    .htmx-indicator { opacity: 0; transition: opacity 200ms ease; font-family: var(--sans); font-size: 12px; color: var(--accent); }
    .htmx-request .htmx-indicator { opacity: 1; }

    /* Spinning loader + overlay for slower areas (e.g. aggregations). */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 26px; height: 26px; border-radius: 50%;
      border: 3px solid var(--rule); border-top-color: var(--accent);
      animation: spin 0.7s linear infinite; display: inline-block;
    }
    /* A results region that dims + shows a centered spinner while loading. */
    .load-region { position: relative; min-height: 120px; }
    .load-region > .load-overlay {
      position: absolute; inset: 0; display: none;
      align-items: center; justify-content: center; flex-direction: column;
      gap: 12px; background: rgba(255,255,255,0.72); z-index: 5;
      font-family: var(--sans); font-size: 13px; color: var(--ink-2);
    }
    /* HTMX adds .htmx-request to the element making the request; show overlay. */
    .load-region.htmx-request > .load-overlay,
    .htmx-request > .load-region > .load-overlay { display: flex; }

    .detail-h { margin: 36px 0 20px; padding-bottom: 18px; border-bottom: 1px solid var(--rule); }
    .kicker { font-family: var(--sans); font-size: 12px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
    .detail-title { font-family: var(--sans); font-size: 28px; line-height: 1.2; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 10px; color: var(--ink); }
    .detail-sub { font-family: var(--sans); color: var(--ink-2); font-size: 15px; }
    .detail-grid { display: grid; grid-template-columns: 1fr 340px; gap: 56px; }
    @media (max-width: 900px) { .detail-grid { grid-template-columns: 1fr; } }
    dl.facts { display: grid; grid-template-columns: 150px 1fr; gap: 0 16px; margin: 0; }
    dl.facts dt { font-size: 11px; font-weight: 500; color: var(--ink-3); padding: 10px 0; border-top: 1px solid var(--rule-2); }
    dl.facts dd { margin: 0; padding: 10px 0; border-top: 1px solid var(--rule-2); font-family: var(--sans); font-size: 14px; color: var(--ink); }

    .section-h { font-family: var(--sans); font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-2); border-bottom: 1px solid var(--rule); padding-bottom: 8px; margin: 32px 0 14px; }

    ul.chain { list-style: none; padding: 0; margin: 0; }
    ul.chain li { position: relative; padding: 12px 0 12px 28px; border-left: 2px solid var(--rule); margin-left: 8px; }
    ul.chain li::before { content: ""; position: absolute; left: -6px; top: 18px; width: 10px; height: 10px; background: var(--paper); border: 2px solid var(--accent); border-radius: 50%; }
    ul.chain li.payment::before { background: var(--accent); border-color: var(--accent); }
    .chain-type { font-family: var(--sans); font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; color: var(--ink-3); }
    .chain-via { font-family: var(--sans); color: var(--ink-3); font-size: 12px; }
    .chain-title { font-family: var(--sans); font-size: 14px; font-weight: 500; color: var(--ink); text-decoration: none; display: block; }
    .chain-title:hover { color: var(--accent); }
    .chain-meta { font-family: var(--sans); font-size: 12px; color: var(--ink-3); }

    table.lines { width: 100%; border-collapse: collapse; font-size: 13.5px; margin-top: 8px; }
    table.lines th { text-align: left; font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; font-weight: 600; color: var(--ink-3); padding: 8px 10px; border-bottom: 1px solid var(--rule); }
    table.lines td { padding: 11px 10px; vertical-align: top; border-bottom: 1px solid var(--rule-2); }

    code.cpv { font-family: var(--mono); font-size: 11.5px; background: var(--paper-2); padding: 2px 6px; border-radius: 5px; color: var(--ink-2); }

    .back { font-family: var(--sans); font-size: 13px; font-weight: 500; color: var(--ink-2); text-decoration: none; }
    .back:hover { color: var(--accent); }

    @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    main > * { animation: rise 400ms cubic-bezier(0.16,1,0.3,1) both; }
    main > *:nth-child(2) { animation-delay: 50ms; }
    main > *:nth-child(3) { animation-delay: 100ms; }
  </style>
</head>
<body>

<header class="masthead">
  <div class="mast-row">
    <a href="/" class="mast-title">Δημόσιες <em>Συμβάσεις</em></a>
    <span class="mast-meta">
      <a href="/">Πράξεις</a>
      <a href="/explore">Σύνοψη</a>
      <a href="/analytics">Αναλυτικά</a>
      <a href="/authorities">Αρχές</a>
      <a href="/contractors">Ανάδοχοι</a>
      <a href="/admin">Διαχείριση</a>
    </span>
  </div>
  <div class="mast-sub">Ένα αρχείο διαγωνισμών, αναθέσεων, συμβάσεων και πληρωμών του ελληνικού δημοσίου.</div>
</header>

<main>
  {% block content %}{% endblock %}
</main>

</body>
</html>
