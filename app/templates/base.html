<!doctype html>
<html lang="el">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}Ελληνικές Δημόσιες Συμβάσεις · Εξερευνητής{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>

  <style>
    :root {
      --paper:      #f4f1ea;       /* warm off-white "newsprint" */
      --paper-2:    #ebe6d9;       /* faint card */
      --ink:        #1a1614;       /* near-black, slightly warm */
      --ink-2:      #4a423d;       /* secondary text */
      --ink-3:      #8a8076;       /* tertiary / meta */
      --rule:       #c8c0ad;       /* hairline rules */
      --rule-2:     #d9d2bf;       /* even softer */
      --accent:     #7a1f1f;       /* oxblood, used sparingly */
      --accent-2:   #a23a3a;
      --warn:       #b8540a;       /* cancellation / amendment */
      --ok:         #2f5d3a;
      --serif:      "EB Garamond", "Times New Roman", Georgia, serif;
      --sans:       "Inter Tight", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      --mono:       "JetBrains Mono", "SF Mono", Menlo, monospace;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.5;
      color: var(--ink);
      background: var(--paper);
      /* very faint paper grain */
      background-image:
        radial-gradient(rgba(0,0,0,0.012) 1px, transparent 1px),
        radial-gradient(rgba(0,0,0,0.012) 1px, transparent 1px);
      background-size: 3px 3px, 5px 5px;
      background-position: 0 0, 1px 2px;
    }

    /* ---------- masthead ---------- */
    header.masthead {
      border-bottom: 2px solid var(--ink);
      padding: 22px 32px 16px;
      background: var(--paper);
    }
    .mast-row { display: flex; justify-content: space-between; align-items: baseline; gap: 32px; }
    .mast-title {
      font-family: var(--serif);
      font-weight: 700;
      font-size: 30px;
      letter-spacing: -0.01em;
      line-height: 1;
      color: var(--ink);
      text-decoration: none;
    }
    .mast-title em {
      font-style: italic;
      font-weight: 400;
      color: var(--accent);
    }
    .mast-meta {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.04em;
      color: var(--ink-3);
      text-transform: uppercase;
    }
    .mast-sub {
      font-family: var(--serif);
      font-style: italic;
      font-size: 14px;
      color: var(--ink-2);
      margin-top: 6px;
      border-top: 1px solid var(--rule);
      padding-top: 8px;
    }

    /* ---------- layout ---------- */
    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 32px 80px;
    }
    .grid {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 40px;
      margin-top: 28px;
    }
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
    }

    /* ---------- filter rail ---------- */
    aside.filters {
      border-right: 1px solid var(--rule);
      padding-right: 32px;
    }
    @media (max-width: 900px) {
      aside.filters { border-right: 0; padding-right: 0; border-bottom: 1px solid var(--rule); padding-bottom: 24px; }
    }
    .filter-h {
      font-family: var(--serif);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink);
      margin: 18px 0 6px;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--ink);
    }
    .filter-h:first-child { margin-top: 0; }
    .field { margin: 8px 0 14px; }
    .field label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-2);
      margin-bottom: 4px;
    }
    .field input, .field select {
      width: 100%;
      font-family: var(--sans);
      font-size: 13px;
      padding: 6px 8px;
      background: var(--paper);
      border: 1px solid var(--rule);
      border-radius: 0;
      color: var(--ink);
      transition: border-color 120ms ease;
    }
    .field input:focus, .field select:focus {
      outline: none;
      border-color: var(--accent);
    }
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .seg {
      display: flex;
      border: 1px solid var(--rule);
    }
    .seg label {
      flex: 1;
      text-align: center;
      padding: 5px 4px;
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      color: var(--ink-2);
      border-right: 1px solid var(--rule);
    }
    .seg label:last-child { border-right: 0; }
    .seg input { display: none; }
    .seg input:checked + span,
    .seg label:has(input:checked) { background: var(--ink); color: var(--paper); }

    /* vertical segmented control (act-type primary filter) */
    .seg-vert { display: flex; flex-direction: column; border: 1px solid var(--rule); }
    .seg-vert label {
      display: block;
      padding: 8px 12px;
      font-size: 13px;
      font-family: var(--serif);
      color: var(--ink-2);
      cursor: pointer;
      border-bottom: 1px solid var(--rule-2);
    }
    .seg-vert label:last-child { border-bottom: 0; }
    .seg-vert label:hover { background: var(--paper-2); }
    /* Highlight is driven by the radio's checked state so it follows clicks
       even though the filter rail isn't re-rendered on HTMX swaps. The .on
       class is kept as a server-rendered fallback for the initial paint. */
    .seg-vert label.on,
    .seg-vert label:has(input:checked) {
      background: var(--ink); color: var(--paper); font-weight: 600;
    }
    .seg-vert input { display: none; }

    /* ---------- search bar ---------- */
    .search-row {
      display: flex;
      gap: 0;
      border: 1.5px solid var(--ink);
      background: var(--paper);
    }
    .search-row input[type=search] {
      flex: 1;
      border: 0;
      background: transparent;
      padding: 10px 14px;
      font-family: var(--serif);
      font-size: 17px;
      color: var(--ink);
    }
    .search-row input[type=search]::placeholder {
      color: var(--ink-3);
      font-style: italic;
    }
    .search-row input[type=search]:focus { outline: none; }
    .search-row button {
      border: 0;
      border-left: 1.5px solid var(--ink);
      background: var(--ink);
      color: var(--paper);
      padding: 0 18px;
      font-family: var(--sans);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
    }
    .search-row button:hover { background: var(--accent); }

    /* ---------- results header (counters) ---------- */
    .results-bar {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 16px;
      margin: 22px 0 12px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--ink);
    }
    .counters {
      font-family: var(--serif);
      font-size: 18px;
      color: var(--ink);
    }
    .counters .num {
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .counters .lbl {
      font-style: italic;
      color: var(--ink-2);
      margin-right: 12px;
    }
    .sort-row { font-family: var(--mono); font-size: 11px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.06em; }
    .sort-row select { font-family: var(--mono); font-size: 11px; background: var(--paper); border: 1px solid var(--rule); padding: 3px 6px; }

    /* ---------- table ---------- */
    table.notices {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    table.notices th {
      text-align: left;
      font-family: var(--sans);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 600;
      color: var(--ink-3);
      padding: 6px 8px;
      border-bottom: 1px solid var(--rule);
    }
    table.notices td {
      padding: 14px 8px;
      vertical-align: top;
      border-bottom: 1px solid var(--rule-2);
    }
    table.notices tbody tr:hover { background: var(--paper-2); }
    .adam {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--ink-3);
      letter-spacing: 0.01em;
      white-space: nowrap;
    }
    .title-cell a {
      color: var(--ink);
      text-decoration: none;
      font-family: var(--serif);
      font-size: 15px;
      line-height: 1.35;
      display: block;
    }
    .title-cell a:hover { color: var(--accent); }
    .auth { font-size: 11px; color: var(--ink-2); margin-top: 4px; letter-spacing: 0.02em; }
    .val {
      font-variant-numeric: tabular-nums;
      font-family: var(--mono);
      font-size: 12px;
      text-align: right;
      white-space: nowrap;
    }
    .meta { font-family: var(--mono); font-size: 10.5px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.06em; }

    /* status pills */
    .pill {
      display: inline-block;
      font-family: var(--sans);
      font-size: 9.5px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 2px 6px;
      border: 1px solid currentColor;
      margin-right: 4px;
    }
    .pill.cancel { color: var(--accent); }
    .pill.amend  { color: var(--warn); }

    /* pagination */
    .pager {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
      padding-top: 12px;
      border-top: 1px solid var(--rule);
      font-family: var(--mono);
      font-size: 11px;
      color: var(--ink-2);
    }
    .pager a, .pager span.page-num {
      color: var(--ink);
      text-decoration: none;
      padding: 4px 10px;
      border: 1px solid var(--rule);
      margin: 0 2px;
      cursor: pointer;
    }
    .pager a:hover { border-color: var(--accent); color: var(--accent); }
    .pager span.disabled { color: var(--ink-3); border: 1px solid var(--rule-2); padding: 4px 10px; margin: 0 2px; }
    .pager span.current { background: var(--ink); color: var(--paper); border-color: var(--ink); padding: 4px 10px; margin: 0 2px; }

    /* loading indicator for HTMX */
    .htmx-indicator {
      opacity: 0;
      transition: opacity 200ms ease;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .htmx-request .htmx-indicator { opacity: 1; }

    /* ---------- detail page ---------- */
    .detail-h {
      margin: 32px 0 16px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--ink);
    }
    .kicker {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 4px;
    }
    .detail-title {
      font-family: var(--serif);
      font-size: 30px;
      line-height: 1.15;
      font-weight: 600;
      margin: 0 0 8px;
      color: var(--ink);
    }
    .detail-sub { font-family: var(--serif); font-style: italic; color: var(--ink-2); font-size: 16px; }
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 56px;
    }
    @media (max-width: 900px) { .detail-grid { grid-template-columns: 1fr; } }
    dl.facts { display: grid; grid-template-columns: 140px 1fr; gap: 4px 16px; margin: 0; }
    dl.facts dt {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-3);
      padding-top: 8px;
      border-top: 1px solid var(--rule-2);
    }
    dl.facts dd { margin: 0; padding-top: 8px; border-top: 1px solid var(--rule-2); font-family: var(--serif); font-size: 15px; }

    .section-h {
      font-family: var(--serif);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink);
      border-bottom: 1px solid var(--ink);
      padding-bottom: 4px;
      margin: 28px 0 12px;
    }

    /* lifecycle chain — vertical timeline */
    ul.chain { list-style: none; padding: 0; margin: 0; }
    ul.chain li {
      position: relative;
      padding: 10px 0 10px 26px;
      border-left: 1px solid var(--rule);
      margin-left: 8px;
    }
    ul.chain li::before {
      content: "";
      position: absolute;
      left: -5px; top: 16px;
      width: 9px; height: 9px;
      background: var(--paper);
      border: 1.5px solid var(--ink);
      border-radius: 50%;
    }
    ul.chain li.payment::before { background: var(--accent); border-color: var(--accent); }
    .chain-type {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-3);
    }
    .chain-via {
      font-family: var(--serif);
      font-style: italic;
      color: var(--ink-2);
      font-size: 12px;
    }
    .chain-title {
      font-family: var(--serif);
      font-size: 14px;
      color: var(--ink);
      text-decoration: none;
      display: block;
    }
    .chain-title:hover { color: var(--accent); }
    .chain-meta { font-family: var(--mono); font-size: 10.5px; color: var(--ink-3); }

    /* table inside detail (line items) */
    table.lines { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 8px; }
    table.lines th { text-align: left; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-3); padding: 6px 8px; border-bottom: 1px solid var(--rule); }
    table.lines td { padding: 10px 8px; vertical-align: top; border-bottom: 1px solid var(--rule-2); }

    code.cpv { font-family: var(--mono); font-size: 11px; background: var(--paper-2); padding: 1px 4px; }

    .back { font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-2); text-decoration: none; }
    .back:hover { color: var(--accent); }

    /* page-load stagger */
    @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    main > * { animation: rise 360ms ease both; }
    main > *:nth-child(2) { animation-delay: 60ms; }
    main > *:nth-child(3) { animation-delay: 120ms; }
  </style>
</head>
<body>

<header class="masthead">
  <div class="mast-row">
    <a href="/" class="mast-title">Δημόσιες <em>Συμβάσεις</em></a>
    <span class="mast-meta">
      <a href="/" style="color:var(--ink-3); text-decoration:none; letter-spacing:0.04em;">Πράξεις</a>
      &nbsp;·&nbsp;
      <a href="/authorities" style="color:var(--ink-3); text-decoration:none; letter-spacing:0.04em;">Αρχές</a>
      &nbsp;·&nbsp;
      <a href="/contractors" style="color:var(--ink-3); text-decoration:none; letter-spacing:0.04em;">Ανάδοχοι</a>
      &nbsp;·&nbsp;
      <a href="/admin" style="color:var(--ink-3); text-decoration:none; letter-spacing:0.04em;">Διαχείριση</a>
    </span>
  </div>
  <div class="mast-sub">Ένα αρχείο διαγωνισμών, αναθέσεων, συμβάσεων και πληρωμών του ελληνικού δημοσίου.</div>
</header>

<main>
  {% block content %}{% endblock %}
</main>

</body>
</html>
