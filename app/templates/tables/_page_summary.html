<button type="button" class="tt-btn tt-secondary tt-mini"
        hx-get="/tables/pages?session_id={{ session_id }}&entry_id={{ entry_id }}"
        hx-target="closest .tt-picker-wrap" hx-swap="innerHTML">
  {% if restricted %}{% if lang=='en' %}Pages {{ label }} — change{% else %}Σελίδες {{ label }} — αλλαγή{% endif %}{% else %}{% if lang=='en' %}All {{ n_pages }} pages — change{% else %}Όλες οι {{ n_pages }} σελίδες — αλλαγή{% endif %}{% endif %}
</button>
{% if restricted %}
<span class="tt-truncated" style="margin-left:.5rem">
  {% if lang=='en' %}scan &amp; OCR limited to {{ n_sel }} of {{ n_pages }} pages{% else %}σάρωση &amp; OCR περιορισμένα σε {{ n_sel }} από {{ n_pages }} σελίδες{% endif %}
</span>
{% endif %}
